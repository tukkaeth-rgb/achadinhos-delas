name: Atualizar Achadinhos Delas

on:
  schedule:
    # 09:07 no horario de Brasilia/Sao Paulo (UTC-3).
    # Evita rodar exatamente no minuto 0 (topo da hora), horario mais
    # congestionado nos runners do GitHub Actions, onde agendamentos
    # costumam atrasar ou ser descartados.
    - cron: "7 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atualizar-achadinhos
  cancel-in-progress: false

jobs:
  update-site:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Atualizar produtos pelo feed Shopee
        env:
          SHOPEE_FEED_URLS: ${{ secrets.SHOPEE_FEED_URLS }}
        run: python work/auto_update_site_from_feeds.py

      - name: Commitar alteracoes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/achadinhos-delas.html outputs/publicar-achadinhos-delas/index.html docs/index.html work/products_history.json
          if git diff --cached --quiet; then
            echo "Sem alteracoes para commitar."
          else
            git commit -m "Atualiza produtos Shopee"
            git push
          fi

      - name: Publicar no GitHub Pages
        run: |
          git fetch origin gh-pages
          rm -rf _site-publicado
          git worktree add _site-publicado origin/gh-pages
          cd _site-publicado
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -a ../docs/. .
          touch .nojekyll
          git add -A
          if git diff --cached --quiet; then
            echo "Site publicado ja esta atualizado."
          else
            git commit -m "Publica site atualizado"
            git push origin HEAD:gh-pages
          fi
